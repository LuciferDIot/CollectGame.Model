name: API Integration Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  api-integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: anfis-demo-ui

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: anfis-demo-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Start server in background
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/pipeline \
                 -X POST \
                 -H "Content-Type: application/json" \
                 -d '{}' \
                 --output /dev/null 2>/dev/null; then
              echo "Server is up (got a response, even if 400)."
              break
            fi
            # A 400 exit code from curl still means server is up
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                 -X POST http://localhost:3000/api/pipeline \
                 -H "Content-Type: application/json" \
                 -d '{}')
            if [ "$STATUS" != "000" ]; then
              echo "Server responded with HTTP $STATUS — ready."
              break
            fi
            echo "  Attempt $i: not ready yet, waiting 2s..."
            sleep 2
          done

      - name: Test 1 — Valid payload returns HTTP 200
        run: |
          STATUS=$(curl -s -o /tmp/resp1.json -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{
              "userId": "ci-test-user",
              "telemetry": {
                "enemiesHit": 10,
                "damageDone": 200,
                "timeInCombat": 15,
                "kills": 3,
                "itemsCollected": 5,
                "pickupAttempts": 6,
                "timeNearInteractables": 8,
                "distanceTraveled": 120,
                "timeSprinting": 12,
                "timeOutOfCombat": 15,
                "deathCount": 1
              }
            }')
          echo "Test 1 — Status: $STATUS"
          cat /tmp/resp1.json
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Expected 200, got $STATUS"
            exit 1
          fi
          echo "PASS"

      - name: Test 2 — Missing userId returns HTTP 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{"telemetry":{"enemiesHit":10}}')
          echo "Test 2 — Status: $STATUS"
          if [ "$STATUS" != "400" ]; then
            echo "FAIL: Expected 400, got $STATUS"
            exit 1
          fi
          echo "PASS"

      - name: Test 3 — Missing telemetry returns HTTP 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{"userId":"user-a"}')
          echo "Test 3 — Status: $STATUS"
          if [ "$STATUS" != "400" ]; then
            echo "FAIL: Expected 400, got $STATUS"
            exit 1
          fi
          echo "PASS"

      - name: Test 4 — Empty body returns HTTP 400
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Test 4 — Status: $STATUS"
          if [ "$STATUS" != "400" ]; then
            echo "FAIL: Expected 400, got $STATUS"
            exit 1
          fi
          echo "PASS"

      - name: Test 5 — Warm latency under 200ms (5 runs)
        run: |
          FAIL=0
          for i in 1 2 3 4 5; do
            START=$(date +%s%N)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:3000/api/pipeline \
              -H "Content-Type: application/json" \
              -d '{
                "userId": "ci-latency-user",
                "telemetry": {
                  "enemiesHit": 10, "damageDone": 200, "timeInCombat": 15,
                  "kills": 3, "itemsCollected": 5, "pickupAttempts": 6,
                  "timeNearInteractables": 8, "distanceTraveled": 120,
                  "timeSprinting": 12, "timeOutOfCombat": 15, "deathCount": 1
                }
              }')
            END=$(date +%s%N)
            MS=$(( (END - START) / 1000000 ))
            echo "  Run $i: HTTP $STATUS | ${MS}ms"
            if [ "$STATUS" != "200" ]; then
              echo "  FAIL: Unexpected status $STATUS on run $i"
              FAIL=1
            fi
            if [ "$MS" -gt 200 ]; then
              echo "  WARN: Run $i exceeded 200ms (${MS}ms) — acceptable on CI runners"
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo "FAIL: One or more latency runs returned a non-200 status."
            exit 1
          fi
          echo "PASS — all 5 warm runs returned HTTP 200"

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true
