name: ANFIS Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# ─────────────────────────────────────────────────────────────────────────────
# JOB GRAPH
#
#   build-and-test ─── runs all jobs sequentially in one runner:
#     1. Build production bundle
#     2. Unit Tests (Vitest)
#     3. API: Valid payload → 200
#     4. API: Missing userId → 400
#     5. API: Missing telemetry → 400
#     6. API: Empty body → 400
#     7. API: Warm latency < 200ms (5 runs)
# ─────────────────────────────────────────────────────────────────────────────

env:
  NEXT_TELEMETRY_DISABLED: 1

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: anfis-demo-ui

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: anfis-demo-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify model files
        run: |
          for f in models/anfis_mlp_weights.json models/cluster_centroids.json; do
            [ -f "$f" ] || { echo "❌ Missing: $f"; exit 1; }
          done
          echo "✅ All model files present."

      - name: Build production bundle
        run: npm run build

      - name: Run unit tests
        run: npm run test

      - name: Start server in background
        run: |
          npm run start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server to be ready
        run: |
          echo "Waiting for server..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:3000/api/pipeline \
              -H "Content-Type: application/json" \
              -d '{}')
            if [ "$STATUS" != "000" ]; then
              echo "Server responded with HTTP $STATUS - ready."
              break
            fi
            echo "  Attempt $i: not ready yet, waiting 2s..."
            sleep 2
          done

      - name: "API: Valid payload → 200"
        run: |
          STATUS=$(curl -s -o /tmp/resp1.json -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{
              "userId": "ci-test-user",
              "telemetry": {
                "enemiesHit": 10, "damageDone": 200, "timeInCombat": 15,
                "kills": 3, "itemsCollected": 5, "pickupAttempts": 6,
                "timeNearInteractables": 8, "distanceTraveled": 120,
                "timeSprinting": 12, "timeOutOfCombat": 15, "deathCount": 1
              }
            }')
          echo "Status: $STATUS"; cat /tmp/resp1.json; echo
          [ "$STATUS" = "200" ] && echo "✅ PASS" || { echo "❌ FAIL: Expected 200, got $STATUS"; exit 1; }

      - name: "API: Missing userId → 400"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{"telemetry":{"enemiesHit":10}}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ] && echo "✅ PASS" || { echo "❌ FAIL: Expected 400, got $STATUS"; exit 1; }

      - name: "API: Missing telemetry → 400"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{"userId":"user-a"}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ] && echo "✅ PASS" || { echo "❌ FAIL: Expected 400, got $STATUS"; exit 1; }

      - name: "API: Empty body → 400"
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:3000/api/pipeline \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "Status: $STATUS"
          [ "$STATUS" = "400" ] && echo "✅ PASS" || { echo "❌ FAIL: Expected 400, got $STATUS"; exit 1; }

      - name: "API: Warm latency < 200ms (5 runs)"
        run: |
          FAIL=0
          for i in 1 2 3 4 5; do
            START=$(date +%s%N)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:3000/api/pipeline \
              -H "Content-Type: application/json" \
              -d '{
                "userId": "ci-latency-user",
                "telemetry": {
                  "enemiesHit": 10, "damageDone": 200, "timeInCombat": 15,
                  "kills": 3, "itemsCollected": 5, "pickupAttempts": 6,
                  "timeNearInteractables": 8, "distanceTraveled": 120,
                  "timeSprinting": 12, "timeOutOfCombat": 15, "deathCount": 1
                }
              }')
            MS=$(( ($(date +%s%N) - START) / 1000000 ))
            echo "  Run $i: HTTP $STATUS | ${MS}ms"
            [ "$MS" -gt 200 ] && echo "  ⚠️ >200ms (CI runner overhead acceptable)"
            [ "$STATUS" != "200" ] && { echo "  ❌ Non-200 on run $i"; FAIL=1; }
          done
          [ "$FAIL" -eq 0 ] && echo "✅ PASS" || { echo "❌ FAIL"; exit 1; }

      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true
